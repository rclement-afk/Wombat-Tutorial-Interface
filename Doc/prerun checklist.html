<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pre-Run Checklist — Robot Setup</title>
<style>
  :root{
    --ink:#0b0f14; --paper:#f3f0e7; --line:#c9c3b2;
    --go:#1f7a3d; --go-bright:#27c257; --lock:#9a948a;
    --accent:#d8492b; --check:#1f7a3d;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    padding:16px 16px 110px;max-width:760px;margin:0 auto}
  header{border-bottom:3px solid var(--ink);padding-bottom:12px;margin-bottom:6px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:25px;margin:5px 0 2px;line-height:1.05;letter-spacing:-.01em}
  .team{font-family:var(--mono);font-size:12px;color:#5a554c}
  .progress{font-family:var(--mono);font-size:13px;color:#5a554c;margin:10px 0 2px;
    display:flex;align-items:center;gap:10px}
  .pbar{flex:1;height:7px;background:#ded9cc;border-radius:4px;overflow:hidden}
  .pfill{height:100%;width:0;background:var(--check);transition:width .25s ease}
  ul{list-style:none;margin:0;padding:0}
  li{border-bottom:1px solid var(--line)}
  label{display:flex;align-items:flex-start;gap:14px;padding:15px 4px;cursor:pointer;
    font-size:17px;line-height:1.3}
  input{appearance:none;-webkit-appearance:none;flex:0 0 auto;width:28px;height:28px;
    border:2.5px solid var(--ink);border-radius:6px;margin:0;cursor:pointer;
    position:relative;background:#fff;transition:background .12s}
  input:checked{background:var(--check);border-color:var(--check)}
  input:checked::after{content:"";position:absolute;left:8px;top:3px;width:7px;height:14px;
    border:solid #fff;border-width:0 3.5px 3.5px 0;transform:rotate(45deg)}
  input:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  label:has(input:checked){color:#6f6a60;text-decoration:line-through;
    text-decoration-color:#bdb7a8;text-decoration-thickness:2px}
  .bar{position:fixed;left:0;right:0;bottom:0;background:var(--paper);
    border-top:3px solid var(--ink);padding:12px 16px;display:flex;gap:12px;
    align-items:center;justify-content:space-between}
  .count{font-family:var(--mono);font-size:13px;color:#5a554c}
  button{font-family:var(--sans);font-size:18px;font-weight:700;border:none;
    border-radius:10px;padding:15px 26px;color:#fff;background:var(--lock);
    cursor:not-allowed;letter-spacing:.01em;min-width:170px}
  button.ready{background:var(--go);cursor:pointer;
    box-shadow:0 0 0 0 rgba(39,194,87,.5);animation:pulse 1.6s infinite}
  button.ready:active{transform:translateY(1px)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(39,194,87,.45)}
    70%{box-shadow:0 0 0 12px rgba(39,194,87,0)}100%{box-shadow:0 0 0 0 rgba(39,194,87,0)}}
  @media(prefers-reduced-motion:reduce){button.ready{animation:none}.pfill{transition:none}}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Pre-Run · Step 1 of 2 · Robot</div>
    <h1>Robot Setup Checklist</h1>
    <div class="team">Noble High School · Team 468 · Oklahoma Region</div>
  </header>

  <div class="progress">
    <span id="ptext">0 / 0</span>
    <span class="pbar"><span class="pfill" id="pfill"></span></span>
  </div>

  <ul id="list">
    <li><label><input type="checkbox"> Battery fully charged (verify voltage if possible)</label></li>
    <li><label><input type="checkbox"> Battery securely mounted (no movement)</label></li>
    <li><label><input type="checkbox"> All servos firmly plugged in</label></li>
    <li><label><input type="checkbox"> All motors firmly plugged into correct ports — verify none pulled loose</label></li>
    <li><label><input type="checkbox"> All analog sensors firmly plugged into correct ports</label></li>
    <li><label><input type="checkbox"> All digital sensors firmly plugged into correct ports</label></li>
    <li><label><input type="checkbox"> wait_for_light works correctly / shut_down_in set in code</label></li>
    <li><label><input type="checkbox"> All screws / nuts tightened</label></li>
    <li><label><input type="checkbox"> No cracked or stressed parts</label></li>
    <li><label><input type="checkbox"> Structure rigid (no flex affecting alignment)</label></li>
    <li><label><input type="checkbox"> Attachments (arms, claws, etc.) secure</label></li>
    <li><label><input type="checkbox"> Light sensor and top-hat values sufficient for reliable reads</label></li>
    <li><label><input type="checkbox"> All wires secured / managed</label></li>
  </ul>

  <div class="bar">
    <span class="count" id="count">Check every item to continue</span>
    <button id="next" disabled>Next: Field</button>
  </div>

<script>
  var boxes = Array.prototype.slice.call(document.querySelectorAll('input'));
  var btn = document.getElementById('next');
  var pfill = document.getElementById('pfill');
  var ptext = document.getElementById('ptext');
  var count = document.getElementById('count');
  var total = boxes.length;

  function update(){
    var done = boxes.filter(function(b){return b.checked;}).length;
    ptext.textContent = done + ' / ' + total;
    pfill.style.width = (done/total*100) + '%';
    if(done === total){
      btn.disabled = false; btn.classList.add('ready');
      count.textContent = 'All set — continue to field';
    } else {
      btn.disabled = true; btn.classList.remove('ready');
      count.textContent = (total-done) + ' left to check';
    }
  }
  boxes.forEach(function(b){ b.addEventListener('change', update); });
  btn.addEventListener('click', function(){
    if(!btn.disabled) window.location.href = 'field_checklist.html';
  });
  update();
</script>
</body>
</html>
