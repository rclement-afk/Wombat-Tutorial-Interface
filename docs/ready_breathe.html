<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ready</title>
<style>
  :root{
    --ink:#0b0f14; --paper:#f3f0e7; --go:#1f7a3d; --accent:#d8492b;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px}
  .eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--go);font-weight:700;margin-bottom:18px}
  /* The breathing ring is the signature: it paces a real inhale/exhale. */
  .ring{width:170px;height:170px;border-radius:50%;border:3px solid var(--go);
    display:flex;align-items:center;justify-content:center;margin-bottom:30px;
    animation:breathe 8s ease-in-out infinite}
  .ring span{font-family:var(--mono);font-size:14px;color:var(--go);letter-spacing:.08em}
  @keyframes breathe{
    0%,100%{transform:scale(.72);opacity:.65}
    45%,55%{transform:scale(1);opacity:1}
  }
  h1{font-size:30px;margin:0 0 10px;line-height:1.1;letter-spacing:-.01em}
  p{font-size:17px;color:#4a463d;max-width:30ch;line-height:1.45;margin:0 0 30px}
  .team{font-family:var(--mono);font-size:12px;color:#7a756a;margin-top:34px}
  button{font-family:var(--sans);font-size:16px;font-weight:700;border:2.5px solid var(--ink);
    background:none;color:var(--ink);border-radius:10px;padding:13px 22px;cursor:pointer}
  button:active{transform:translateY(1px)}
  @media(prefers-reduced-motion:reduce){.ring{animation:none;transform:scale(1);opacity:1}}
</style>
</head>
<body>
  <div class="eyebrow">All checks complete</div>
  <div class="ring"><span>breathe</span></div>
  <h1>You're ready.</h1>
  <p>Robot's set. Field's set. Take one slow breath — in, and out — then start when you're calm.</p>
  <button id="restart">Start over</button>
  <div class="team">Noble High School · Team 468 · Oklahoma Region</div>
<script>
  document.getElementById('restart').addEventListener('click', function(){
    window.location.href = 'prerun_checklist.html';
  });
</script>
</body>
</html>
